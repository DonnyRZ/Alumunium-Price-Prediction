name: Refresh Production Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "30 23 * * 1-5"

jobs:
  refresh-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build latest production payload
        env:
          GEMINI_API_KEY: ${{ AIzaSyAhk2NQb-SI4D2tjFH2zM9sNVdv4nbUwwE }}
          PRODUCTION_SENTIMENT_LOOKBACK_DAYS: "30"
          PRODUCTION_SENTIMENT_LANGUAGES: "english"
          PRODUCTION_SENTIMENT_WINDOW_DAYS: "7"
          PRODUCTION_SENTIMENT_MAXRECORDS: "25"
          PRODUCTION_SENTIMENT_RETRIES: "3"
          PRODUCTION_SENTIMENT_PAUSE_SECONDS: "3"
        run: python production/pipeline/run_daily_pipeline.py

      - name: Commit latest dashboard payload
        run: |
          if git diff --quiet -- production/data/dashboard/latest_dashboard_payload.json; then
            echo "No dashboard payload changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add production/data/dashboard/latest_dashboard_payload.json
          git commit -m "chore: refresh production dashboard payload"
          git push
