name: Refresh Production Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "30 23 * * 1-5"

jobs:
  refresh-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh production spreadsheet state
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          PRODUCTION_SPREADSHEET_NAME: "Alumunium_Data_Master"
          PRODUCTION_SENTIMENT_LOOKBACK_DAYS: "7"
          PRODUCTION_SENTIMENT_LANGUAGES: "english"
          PRODUCTION_SENTIMENT_WINDOW_DAYS: "3"
          PRODUCTION_SENTIMENT_MAXRECORDS: "15"
          PRODUCTION_SENTIMENT_RETRIES: "2"
          PRODUCTION_SENTIMENT_PAUSE_SECONDS: "4"
          PRODUCTION_SENTIMENT_MAX_NEW_ARTICLES_PER_RUN: "5"
        run: python production/pipeline/run_daily_pipeline.py
